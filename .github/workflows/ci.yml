name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Ambil code dari repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Login ke Docker Hub
      - name: Login Docker
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3. Build Docker Image
      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ci-cd-app .

      # 4. Push ke Docker Hub
      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ci-cd-app

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy (dummy)
        run: echo "Deploy berhasil!"

        - name: Debug username
  run: echo "USER=${{ secrets.DOCKER_USERNAME }}"